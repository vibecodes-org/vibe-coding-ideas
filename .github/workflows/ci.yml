name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Blocking gate: typecheck must pass for the job to succeed.
      - name: Typecheck
        run: npm run typecheck

      # Blocking gate: lint must pass (0 errors; warnings allowed).
      - name: Lint
        run: npm run lint

      # Blocking gate: the unit test suite must be green.
      - name: Unit tests
        run: npm run test
