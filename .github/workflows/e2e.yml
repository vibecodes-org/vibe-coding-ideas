name: E2E Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        project: [Desktop Chrome, Desktop Firefox, Mobile Chrome]
        include:
          - project: Desktop Chrome
            browser: chromium
          - project: Desktop Firefox
            browser: firefox
          - project: Mobile Chrome
            browser: chromium

    env:
      CI: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
      TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
      TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
      TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      TEST_FRESH_EMAIL: ${{ secrets.TEST_FRESH_EMAIL }}
      TEST_FRESH_PASSWORD: ${{ secrets.TEST_FRESH_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: |
          npx playwright install chromium --with-deps
          ${{ matrix.browser != 'chromium' && format('npx playwright install {0} --with-deps', matrix.browser) || '' }}

      - name: Run E2E tests (${{ matrix.project }})
        run: npx playwright test --project="${{ matrix.project }}"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  create-failure-task:
    needs: e2e-tests
    if: failure() && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_KEY }}
    steps:
      - name: Create board task for E2E failure
        run: |
          IDEA_ID="${{ vars.VIBECODES_IDEA_ID }}"
          COLUMN_ID="${{ vars.VIBECODES_TODO_COLUMN_ID }}"
          BUG_LABEL_ID="${{ vars.VIBECODES_BUG_LABEL_ID }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          TITLE="[E2E] Tests failed on ${BRANCH} (${ACTOR})"
          SAFE_TITLE=$(echo "$TITLE" | sed 's/\\/\\\\/g; s/"/\\"/g')

          # Get max position in target column
          MAX_POS=$(curl -s "${SUPABASE_URL}/rest/v1/board_tasks?idea_id=eq.${IDEA_ID}&column_id=eq.${COLUMN_ID}&select=position&order=position.desc&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" | jq -r 'if type == "array" then .[0].position // 0 else 0 end')
          NEW_POS=$((MAX_POS + 1000))

          # Create the task
          TASK=$(curl -s "${SUPABASE_URL}/rest/v1/board_tasks" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{
              \"idea_id\": \"${IDEA_ID}\",
              \"column_id\": \"${COLUMN_ID}\",
              \"title\": \"${SAFE_TITLE}\",
              \"description\": \"Auto-created from CI E2E test failure.\\n\\n**Branch:** ${BRANCH}\\n**Commit:** ${SHORT_SHA}\\n**Triggered by:** ${ACTOR}\\n**CI run:** ${RUN_URL}\",
              \"position\": ${NEW_POS}
            }")
          TASK_ID=$(echo "$TASK" | jq -r 'if type == "array" then .[0].id // empty else empty end')

          # Apply bug label
          if [ -n "$TASK_ID" ] && [ -n "$BUG_LABEL_ID" ]; then
            curl -s "${SUPABASE_URL}/rest/v1/board_task_labels" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"task_id\": \"${TASK_ID}\", \"label_id\": \"${BUG_LABEL_ID}\"}"
          fi

